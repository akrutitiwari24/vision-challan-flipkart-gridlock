<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challan Verification — VisionChallan AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0f1a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            background: #131625;
            border: 1px solid #1e2235;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 64px; height: 64px;
            background: rgba(34,197,94,0.15);
            border: 2px solid rgba(34,197,94,0.4);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
        h1 { font-size: 1.3rem; font-weight: 700; color: #f1f5f9; margin-bottom: 0.5rem; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
        .field {
            background: #0d0f1a;
            border: 1px solid #1e2235;
            border-radius: 8px;
            padding: 0.85rem 1.25rem;
            margin-bottom: 0.75rem;
            text-align: left;
        }
        .field-label { font-size: 0.68rem; color: #334155; text-transform: uppercase;
                       letter-spacing: 0.08em; margin-bottom: 3px; }
        .field-value { font-size: 0.95rem; color: #e2e8f0; font-weight: 500; }
        .badge-verified {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(34,197,94,0.1);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 20px;
            padding: 5px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 1.5rem;
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.72rem;
            color: #1e2235;
        }
        .powered {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #334155;
        }
    </style>
    <script>
        // Parse challan number from URL query string
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const challan = params.get('id') || 'BLR-VC-20260618-141026';
            const plate   = params.get('plate') || 'KA01AB1234';
            const vtype   = params.get('type')  || 'Triple Riding';
            const fine    = params.get('fine')  || '1000';
            
            document.getElementById('challan-no').textContent = challan;
            document.getElementById('plate-no').textContent   = plate;
            document.getElementById('vtype').textContent      = vtype;
            document.getElementById('fine').textContent       = 'Rs. ' + parseInt(fine).toLocaleString('en-IN');
        }
    </script>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Challan Verified</h1>
        <p class="subtitle">This e-challan has been verified by the VisionChallan AI system under the Motor Vehicles Act, 1988.</p>
        
        <div class="field">
            <div class="field-label">Challan Number</div>
            <div class="field-value" id="challan-no">—</div>
        </div>
        <div class="field">
            <div class="field-label">Vehicle Registration</div>
            <div class="field-value" id="plate-no">—</div>
        </div>
        <div class="field">
            <div class="field-label">Violation</div>
            <div class="field-value" id="vtype">—</div>
        </div>
        <div class="field">
            <div class="field-label">Fine Amount</div>
            <div class="field-value" id="fine">—</div>
        </div>
        
        <div class="badge-verified">Verified · Motor Vehicles Act 1988</div>
        
        <div class="footer">
            Powered by VisionChallan AI<br>
            Flipkart Gridlock 2025 Demo System
        </div>
    </div>
</body>
</html>
